    function render(newLang) {
      if (newLang) lang = newLang;
      const t = copy[lang];

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (!t[key] && t[key] !== '') return;
        if (t[key].includes('<em>')) {
          el.innerHTML = t[key];
        } else {
          el.textContent = t[key];
        }
      });

      // placeholders
      document.querySelectorAll('[data-placeholder-key]').forEach(el => {
        const key = el.getAttribute('data-placeholder-key');
        if (t[key]) el.placeholder = t[key];
      });

      // sync lang buttons
      ['btn-en','btn-nl','mbtn-en','mbtn-nl'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', id.includes(lang));
      });

      document.documentElement.lang = lang;

      // also update cookie banner text
      if (typeof renderCookieBanner === 'function') renderCookieBanner();
    }

    // Expose render globally so setLang can call it
    window._wsRender = render;

      const double = [...tickerItems, ...tickerItems];

      if (cl) cl.textContent = t.cookieBannerLink;
      if (ca) ca.textContent = t.cookieAccept;
      if (cd) cd.textContent = t.cookieDecline;
    }

      const consent = localStorage.getItem('ws_cookie_consent');
      if (!consent) document.getElementById('cookie-banner').style.display = 'block';

<script>
(async function() {
  const RAILWAY = 'https://winestealsgithubio-production.up.railway.app';
  
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function scoreColor(s) { return s>=30?'#4CAF50':s>=15?'#FF9800':'#9E9E9E'; }
  
  try {
    const res = await fetch(RAILWAY + '/steals?limit=6&days=90');
    const data = await res.json();
    const steals = data.steals || [];
    
    // Widget 1: Live updates (donkere achtergrond)
    const liveEl = document.getElementById('live-items');
    if (liveEl) {
      if (steals.length === 0) {
        liveEl.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px">Scan een wijnkaart om steals te zien</div>';
      } else {
        liveEl.innerHTML = steals.slice(0,3).map(s => {
          const saving = s.market_price && s.restaurant_price ? Math.round(s.market_price - s.restaurant_price) : null;
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08)">'
            + '<div><div style="font-size:13px;color:white;font-weight:500">' + esc(s.wine_name) + '</div>'
            + '<div style="font-size:11px;color:rgba(255,255,255,0.4)">' + esc(s.restaurants?.name||'') + (s.vintage?' · '+s.vintage:'') + '</div></div>'
            + '<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:white">€' + s.restaurant_price + '</div>'
            + (saving?'<div style="font-size:11px;color:#4CAF50">€' + saving + ' goedkoper</div>':'') + '</div>'
            + '</div>';
        }).join('');
      }
      const timeEl = document.getElementById('live-time');
      if (timeEl && steals.length > 0) {
        const d = new Date(steals[0].scanned_at);
        timeEl.textContent = 'Laatste scan: ' + d.toLocaleDateString('nl-NL', {day:'numeric',month:'short'});
      }
    }
    
    // Widget 2: Top steals database (lichte achtergrond)
    const dbEl = document.getElementById('db-steals-items');
    if (dbEl) {
      if (steals.length === 0) {
        dbEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">Scan een wijnkaart om steals te zien</div>';
      } else {
        dbEl.innerHTML = steals.map(s => {
          const saving = s.market_price && s.restaurant_price ? Math.round(s.market_price - s.restaurant_price) : null;
          return '<div style="display:flex;align-items:center;gap:12px;padding:12px 12px;border-bottom:1px solid var(--border)">'
            + '<div style="width:36px;height:36px;border-radius:50%;background:' + scoreColor(s.steal_score) + ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0">' + (s.steal_score||'?') + '</div>'
            + '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(s.wine_name) + '</div>'
            + '<div style="font-size:11px;color:var(--muted)">' + esc(s.restaurants?.name||'') + (s.vintage?' · '+s.vintage:'') + '</div></div>'
            + '<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:700;color:var(--wine)">€' + s.restaurant_price + '</div>'
            + (saving?'<div style="font-size:11px;color:#2E7D32;font-weight:500">-€'+saving+'</div>':'') + '</div>'
            + '</div>';
        }).join('');
      }
    }
  } catch(e) { console.warn('Widget error:', e.message); }
})();
</script>
