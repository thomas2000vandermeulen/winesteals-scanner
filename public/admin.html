<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WineSteals Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--wine:#7B1C2E;--wine-dark:#4A0F1C;--gold:#C9A84C;--cream:#F8F4EE;--ink:#1A1208;--muted:#6B5E52;--border:rgba(123,28,46,0.15);--green:#2E7D32;--red:#C62828}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
    .login-overlay{position:fixed;inset:0;background:var(--wine-dark);z-index:999;display:flex;align-items:center;justify-content:center}
    .login-overlay.hidden{display:none}
    .login-box{background:var(--cream);padding:48px 40px;border-radius:12px;width:360px;text-align:center}
    .login-box h1{font-family:'Playfair Display',serif;color:var(--wine-dark);margin-bottom:8px;font-size:24px}
    .login-box p{color:var(--muted);font-size:14px;margin-bottom:28px}
    .login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:16px;background:white}
    .login-box button{width:100%;padding:12px;background:var(--wine);color:white;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
    .header{background:var(--wine-dark);color:white;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .header h1{font-family:'Playfair Display',serif;font-size:20px}
    .stats{display:flex;gap:20px;flex-wrap:wrap}
    .stat{font-size:13px;opacity:.85;display:flex;flex-direction:column;align-items:center}
    .stat strong{font-size:20px;font-weight:700;color:var(--gold)}
    .container{max-width:1400px;margin:0 auto;padding:24px 32px}
    .tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border)}
    .tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
    .tab-btn.active{color:var(--wine);border-bottom-color:var(--wine)}
    .toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
    .toolbar input,.toolbar select{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:white}
    .toolbar input{flex:1;min-width:200px}
    .btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--wine);color:white}
    .btn-secondary{background:white;color:var(--wine);border:1.5px solid var(--wine)}
    .btn-small{padding:5px 12px;font-size:12px}
    .btn-danger{background:var(--red);color:white}
    .btn-success{background:var(--green);color:white}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;background:var(--wine-dark);color:white;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
    td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:hover td{background:rgba(123,28,46,.03)}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
    .badge-red{background:rgba(123,28,46,.1);color:var(--wine)}
    .badge-white{background:rgba(201,168,76,.15);color:#7a6020}
    .badge-sparkling{background:rgba(100,149,237,.15);color:#3b5998}
    .badge-fortified{background:rgba(139,90,43,.15);color:#6b4423}
    .badge-ros\u00e9,.badge-rose{background:rgba(255,105,180,.15);color:#c2185b}
    .vp-panel{background:rgba(123,28,46,.04);border-left:4px solid var(--wine);padding:14px 16px}
    .vp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
    .vp-row label{font-size:12px;color:var(--muted)}
    .vp-row input{width:85px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px}
    .vp-add{display:flex;gap:8px;align-items:center;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
    .expand-btn{background:none;border:none;cursor:pointer;color:var(--wine);font-size:13px;padding:2px 4px}
    .empty{text-align:center;padding:60px;color:var(--muted)}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;color:white;z-index:9999;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none;max-width:320px}
    .toast.show{opacity:1;transform:translateY(0)}
    .toast.success{background:var(--green)}
    .toast.error{background:var(--red)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px}
    .form-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:white}
  </style>
</head>
<body>
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h1>WineSteals</h1>
    <p>Admin toegang vereist</p>
    <input type="password" id="pw-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')checkPw()" />
    <button onclick="checkPw()">Inloggen</button>
  </div>
</div>
<div class="header">
  <h1>WineSteals Admin</h1>
  <div class="stats">
    <div class="stat"><strong id="s-total">–</strong>wijnen totaal</div>
    <div class="stat"><strong id="s-pending">–</strong>pending</div>
    <div class="stat"><strong id="s-red">–</strong>rood</div>
    <div class="stat"><strong id="s-white">–</strong>wit</div>
    <div class="stat"><strong id="s-sparkling">–</strong>mousseux</div>
    <div class="stat"><strong id="s-vintage">–</strong>vintage prijzen</div>
  </div>
</div>
<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('priced')">Met prijs</button>
    <button class="tab-btn" onclick="switchTab('pending')">Pending</button>
    <button class="tab-btn" onclick="switchTab('add')">+ Toevoegen</button>
  </div>
  <div id="tab-priced">
    <div class="toolbar">
      <input id="q-priced" type="text" placeholder="Zoek naam, producent, regio..." oninput="filterPriced()" />
      <select id="f-colour" onchange="filterPriced()">
        <option value="">Alle kleuren</option>
        <option value="red">Rood</option><option value="white">Wit</option>
        <option value="sparkling">Mousseux</option><option value="ros\u00e9">Ros\u00e9</option><option value="fortified">Versterkt</option>
      </select>
      <button class="btn btn-secondary btn-small" onclick="loadPriced()">\u21bb Laden</button>
    </div>
    <div id="priced-wrap"><div class="empty"><p>Laden...</p></div></div>
  </div>
  <div id="tab-pending" style="display:none">
    <div class="toolbar">
      <input id="q-pending" type="text" placeholder="Zoek pending wijnen..." oninput="filterPending()" />
      <button class="btn btn-secondary btn-small" onclick="loadPending()">\u21bb Laden</button>
    </div>
    <div id="pending-wrap"><div class="empty"><p>Laden...</p></div></div>
  </div>
  <div id="tab-add" style="display:none">
    <h3 style="font-family:'Playfair Display',serif;margin-bottom:20px;color:var(--wine-dark)">Nieuwe wijn toevoegen</h3>
    <div class="form-grid">
      <div class="form-group"><label>Naam *</label><input id="f-name" type="text" placeholder="bijv. Barolo Riserva"></div>
      <div class="form-group"><label>Producent *</label><input id="f-producer" type="text" placeholder="bijv. Ceretto"></div>
      <div class="form-group"><label>Jaargang</label><input id="f-vintage" type="number" placeholder="2019"></div>
      <div class="form-group"><label>Kleur</label>
        <select id="f-colour-add"><option value="red">Rood</option><option value="white">Wit</option><option value="sparkling">Mousseux</option><option value="ros\u00e9">Ros\u00e9</option><option value="fortified">Versterkt</option></select>
      </div>
      <div class="form-group"><label>Marktprijs (\u20ac)</label><input id="f-price" type="number" placeholder="65"></div>
      <div class="form-group"><label>Regio</label><input id="f-region" type="text" placeholder="bijv. Bordeaux"></div>
      <div class="form-group"><label>Land</label><input id="f-country" type="text" placeholder="bijv. France"></div>
      <div class="form-group"><label>Appellation</label><input id="f-appellation" type="text" placeholder="bijv. Barolo DOCG"></div>
    </div>
    <div class="form-group" style="max-width:290px;margin-top:14px"><label>Druif</label><input id="f-grape" type="text" placeholder="bijv. Nebbiolo"></div>
    <button class="btn btn-primary" onclick="addWine()" style="margin-top:16px">Wijn toevoegen</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkaGN6bGFiamVjcXhseXV4cHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDI1MzEsImV4cCI6MjA5MTU3ODUzMX0.9vpr3P0Q6xhs_99nLsU_yE3Ht6prPe9cPjUrt0f5mX4';
const ADMIN_PASSWORD='winesteals2026';
const SB='https://kdhczlabjecqxlyuxprl.supabase.co/rest/v1';
let allPriced=[],allPending=[],expanded=new Set();

function checkPw(){
  if(document.getElementById('pw-input').value===ADMIN_PASSWORD){
    localStorage.setItem('ws_admin_auth',btoa(ADMIN_PASSWORD));
    document.getElementById('login-overlay').classList.add('hidden');
    init();
  }else{document.getElementById('pw-input').style.borderColor='#C62828'}
}

const H=(extra)=>({'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json',...extra});

async function sbGet(path){
  const r=await fetch(SB+path,{headers:H({'Prefer':'count=exact'})});
  if(!r.ok)throw new Error(await r.text()||r.status);
  const data=await r.json();
  const count=parseInt((r.headers.get('content-range')||'').split('/')[1])||data.length;
  return{data,count};
}

async function sbPost(path,body){
  const r=await fetch(SB+path,{method:'POST',headers:H({'Prefer':'return=representation'}),body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text()||r.status);
  return r.json();
}

async function sbPatch(path,body){
  const r=await fetch(SB+path,{method:'PATCH',headers:H({'Prefer':'return=minimal'}),body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text()||r.status);
}

async function sbDelete(path){
  const r=await fetch(SB+path,{method:'DELETE',headers:H({})});
  if(!r.ok)throw new Error(await r.text()||r.status);
}

async function init(){await Promise.all([loadStats(),loadPriced(),loadPending()])}

async function loadStats(){
  try{
    const[t,p,rd,wh,sp,vt]=await Promise.all([
      sbGet('/wines?select=id&price_source=neq.pending&limit=1'),
      sbGet('/wines?select=id&price_source=eq.pending&limit=1'),
      sbGet('/wines?select=id&colour=eq.red&price_source=neq.pending&limit=1'),
      sbGet('/wines?select=id&colour=eq.white&price_source=neq.pending&limit=1'),
      sbGet('/wines?select=id&colour=eq.sparkling&price_source=neq.pending&limit=1'),
      sbGet('/wine_vintage_prices?select=id&limit=1'),
    ]);
    document.getElementById('s-total').textContent=t.count;
    document.getElementById('s-pending').textContent=p.count;
    document.getElementById('s-red').textContent=rd.count;
    document.getElementById('s-white').textContent=wh.count;
    document.getElementById('s-sparkling').textContent=sp.count;
    document.getElementById('s-vintage').textContent=vt.count;
  }catch(e){console.warn('stats',e.message)}
}

async function loadPriced(){
  document.getElementById('priced-wrap').innerHTML='<div class="empty"><p>Laden...</p></div>';
  try{
    const{data,count}=await sbGet('/wines?price_source=neq.pending&order=name.asc&limit=10000&select=id,name,producer,vintage,region,country,colour,market_price_eur,price_source');
    allPriced=data;
    filterPriced();
  }catch(e){showToast('Laadlout: '+e.message,'error')}
}

function filterPriced(){
  const q=(document.getElementById('q-priced')?.value||'').toLowerCase();
  const c=document.getElementById('f-colour')?.value||'';
  renderPriced(allPriced.filter(w=>(!q||[w.name||'',w.producer||'',w.region||''].join(' ').toLowerCase().includes(q))&&(!c||w.colour===c)));
}

function renderPriced(wines){
  const el=document.getElementById('priced-wrap');
  if(!wines.length){el.innerHTML='<div class="empty"><p>Geen wijnen</p></div>';return}
  let h='<table><thead><tr><th></th><th>Naam</th><th>Producent</th><th>Kleur</th><th>Jaargang</th><th>Marktprijs</th><th>Bron</th><th>Acties</th></tr></thead><tbody>';
  for(const w of wines){
    const exp=expanded.has(w.id);
    h+='<tr><td><button class="expand-btn" onclick="toggleExp(\'' +w.id+ '\',this)">'+(exp?'\u25bc':'\u25b6')+'</button></td>';
    h+='<td><strong>'+esc(w.name)+'</strong></td>';
    h+='<td style="color:var(--muted);font-size:12px">'+esc(w.producer||'')+'</td>';
    h+='<td><span class="badge badge-'+(w.colour||'red')+'">'+(w.colour||'?')+'</span></td>';
    h+='<td>'+(w.vintage||'NV')+'</td>';
    h+='<td><strong>'+(w.market_price_eur?'\u20ac'+w.market_price_eur:'\u2014')+'</strong></td>';
    h+='<td style="font-size:11px;color:var(--muted)">'+(w.price_source||'')+'</td>';
    h+='<td style="white-space:nowrap"><input type="number" id="pi-'+w.id+'" value="'+(w.market_price_eur||'')+'" placeholder="\u20ac" style="width:70px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:12px"> <button class="btn btn-small btn-primary" onclick="savePrice(\'' +w.id+ '\')">\ud83d\udcbe</button> <button class="btn btn-small btn-danger" onclick="delWine(\'' +w.id+ '\',this)">\ud83d\uddd1</button></td></tr>';
    if(exp)h+='<tr><td colspan="8" style="padding:0"><div class="vp-panel" id="vp-'+w.id+'"><em style="font-size:13px;color:var(--muted)">Laden...</em></div></td></tr>';
  }
  h+='</tbody></table>';
  el.innerHTML=h;
  for(const id of expanded){const p=document.getElementById('vp-'+id);if(p)loadVP(id,p)}
}

async function savePrice(id){
  const price=parseFloat(document.getElementById('pi-'+id)?.value);
  if(!price)return showToast('Voer een prijs in','error');
  try{
    await sbPatch('/wines?id=eq.'+id,{market_price_eur:price,market_price_min:Math.round(price*.8*100)/100,market_price_max:Math.round(price*1.3*100)/100,price_source:'manual'});
    showToast('Opgeslagen \u2713');
    loadPriced();loadStats();
  }catch(e){showToast('Fout: '+e.message,'error')}
}

async function delWine(id,btn){
  if(!confirm('Wijn verwijderen?'))return;
  btn.textContent='...';
  try{await sbDelete('/wines?id=eq.'+id);loadPriced();loadStats();}
  catch(e){showToast('Fout: '+e.message,'error');btn.textContent='\ud83d\uddd1'}
}

function toggleExp(id,btn){
  if(expanded.has(id))expanded.delete(id);else expanded.add(id);
  filterPriced();
}

async function loadVP(wineId,panel){
  try{
    const{data}=await sbGet('/wine_vintage_prices?wine_id=eq.'+wineId+'&order=vintage.desc&limit=50&select=id,vintage,market_price_eur,market_price_min,market_price_max');
    renderVP(wineId,panel,data);
  }catch(e){panel.innerHTML='<p style="color:red;font-size:13px">'+e.message+'</p>'}
}

function renderVP(wineId,panel,rows){
  let h='<div style="margin-bottom:10px;font-size:13px;font-weight:600;color:var(--wine-dark)">Jaargangprijzen</div>';
  for(const r of rows){
    h+='<div class="vp-row"><label><strong>'+r.vintage+'</strong></label><label>\u20ac</label><input type="number" id="ve-'+r.id+'" value="'+(r.market_price_eur||'')+'"><label>min</label><input type="number" id="vm-'+r.id+'" value="'+(r.market_price_min||'')+'"><label>max</label><input type="number" id="vx-'+r.id+'" value="'+(r.market_price_max||'')+'"><button class="btn btn-small btn-success" onclick="saveVP(\'' +r.id+ '\',\'' +wineId+ '\')">\ud83d\udcbe</button><button class="btn btn-small btn-danger" onclick="delVP(\'' +r.id+ '\',\'' +wineId+ '\')">\u2715</button></div>';
  }
  if(!rows.length)h+='<p style="font-size:13px;color:var(--muted);margin-bottom:10px">Nog geen jaargangprijzen.</p>';
  h+='<div class="vp-add"><label style="font-size:12px;color:var(--muted)">Toevoegen:</label><input type="number" id="ny-'+wineId+'" placeholder="Jaargang" style="width:90px"><input type="number" id="np-'+wineId+'" placeholder="\u20ac prijs" style="width:85px"><input type="number" id="nn-'+wineId+'" placeholder="Min" style="width:75px"><input type="number" id="nx-'+wineId+'" placeholder="Max" style="width:75px"><button class="btn btn-small btn-primary" onclick="addVP(\'' +wineId+ '\')">+ Toevoegen</button></div>';
  panel.innerHTML=h;
}

async function saveVP(rowId,wineId){
  const price=parseFloat(document.getElementById('ve-'+rowId)?.value);
  const min=parseFloat(document.getElementById('vm-'+rowId)?.value)||null;
  const max=parseFloat(document.getElementById('vx-'+rowId)?.value)||null;
  if(!price)return showToast('Voer een prijs in','error');
  try{await sbPatch('/wine_vintage_prices?id=eq.'+rowId,{market_price_eur:price,market_price_min:min,market_price_max:max,updated_at:new Date().toISOString()});showToast('Opgeslagen \u2713');}
  catch(e){showToast('Fout: '+e.message,'error')}
}

async function addVP(wineId){
  const vintage=parseInt(document.getElementById('ny-'+wineId)?.value);
  const price=parseFloat(document.getElementById('np-'+wineId)?.value);
  const min=parseFloat(document.getElementById('nn-'+wineId)?.value)||Math.round(price*.8*100)/100;
  const max=parseFloat(document.getElementById('nx-'+wineId)?.value)||Math.round(price*1.3*100)/100;
  if(!vintage||!price)return showToast('Jaargang en prijs verplicht','error');
  try{
    await sbPost('/wine_vintage_prices',{wine_id:wineId,vintage,market_price_eur:price,market_price_min:min,market_price_max:max,price_source:'manual'});
    showToast('Jaargang toegevoegd \u2713');
    const panel=document.getElementById('vp-'+wineId);if(panel)loadVP(wineId,panel);
    loadStats();
  }catch(e){showToast('Fout: '+e.message,'error')}
}

async function delVP(rowId,wineId){
  if(!confirm('Verwijderen?'))return;
  try{await sbDelete('/wine_vintage_prices?id=eq.'+rowId);showToast('Verwijderd');const panel=document.getElementById('vp-'+wineId);if(panel)loadVP(wineId,panel);loadStats();}
  catch(e){showToast('Fout: '+e.message,'error')}
}

async function loadPending(){
  document.getElementById('pending-wrap').innerHTML='<div class="empty"><p>Laden...</p></div>';
  try{
    const{data,count}=await sbGet('/wines?price_source=eq.pending&order=name.asc&limit=10000&select=id,name,producer,vintage,region,country,colour');
    allPending=data;
    document.getElementById('s-pending').textContent=count;
    filterPending();
  }catch(e){showToast('Laadlout: '+e.message,'error')}
}

function filterPending(){
  const q=(document.getElementById('q-pending')?.value||'').toLowerCase();
  renderPending(allPending.filter(w=>!q||[w.name||'',w.producer||''].join(' ').toLowerCase().includes(q)));
}

function renderPending(wines){
  const el=document.getElementById('pending-wrap');
  if(!wines.length){el.innerHTML='<div class="empty"><p>Geen pending wijnen</p></div>';return}
  let h='<table><thead><tr><th>Naam</th><th>Producent</th><th>Jaargang</th><th>Regio</th><th>Marktprijs instellen</th><th>Acties</th></tr></thead><tbody>';
  for(const w of wines){
    h+='<tr><td><strong>'+esc(w.name)+'</strong></td><td style="color:var(--muted);font-size:12px">'+esc(w.producer||'')+'</td><td>'+(w.vintage||'NV')+'</td>';
    h+='<td style="font-size:12px;color:var(--muted)">'+esc([w.region,w.country].filter(Boolean).join(' \u00b7 '))+'</td>';
    h+='<td><input type="number" id="pp-'+w.id+'" placeholder="\u20ac marktprijs" style="width:120px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px"> <button class="btn btn-small btn-success" onclick="approvePending(\'' +w.id+ '\')">\u2713 Goedkeuren</button></td>';
    h+='<td><button class="btn btn-small btn-danger" onclick="delWine(\'' +w.id+ '\',this)">\ud83d\uddd1</button></td></tr>';
  }
  h+='</tbody></table>';
  el.innerHTML=h;
}

async function approvePending(id){
  const price=parseFloat(document.getElementById('pp-'+id)?.value);
  if(!price)return showToast('Voer een marktprijs in','error');
  try{
    await sbPatch('/wines?id=eq.'+id,{market_price_eur:price,market_price_min:Math.round(price*.8*100)/100,market_price_max:Math.round(price*1.3*100)/100,price_source:'manual'});
    showToast('Goedgekeurd \u2713');
    loadPending();loadStats();
  }catch(e){showToast('Fout: '+e.message,'error')}
}

async function addWine(){
  const name=document.getElementById('f-name').value.trim();
  const producer=document.getElementById('f-producer').value.trim();
  if(!name||!producer)return showToast('Naam en producent verplicht','error');
  const price=parseFloat(document.getElementById('f-price').value)||null;
  try{
    await sbPost('/wines',{name,producer,vintage:parseInt(document.getElementById('f-vintage').value)||null,colour:document.getElementById('f-colour-add').value,region:document.getElementById('f-region').value.trim()||null,country:document.getElementById('f-country').value.trim()||null,appellation:document.getElementById('f-appellation').value.trim()||null,grape:document.getElementById('f-grape').value.trim()||null,market_price_eur:price,market_price_min:price?Math.round(price*.8*100)/100:null,market_price_max:price?Math.round(price*1.3*100)/100:null,price_source:'manual'});
    showToast('Wijn toegevoegd \u2713');
    ['f-name','f-producer','f-vintage','f-price','f-region','f-country','f-appellation','f-grape'].forEach(i=>document.getElementById(i).value='');
    loadStats();
  }catch(e){showToast('Fout: '+e.message,'error')}
}

function switchTab(tab){
  ['priced','pending','add'].forEach((t,i)=>{
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',t===tab);
  });
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'success')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

if(localStorage.getItem('ws_admin_auth')===btoa(ADMIN_PASSWORD)){
  document.getElementById('login-overlay').classList.add('hidden');
  init();
}
</script>
</body>
</html>
