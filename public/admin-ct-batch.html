<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wine-Searcher Zoeker — WineSteals Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#7B1C2E;--wine-dark:#4A0F1C;--gold:#C9A84C;--cream:#F8F4EE;--ink:#1A1208;--muted:#6B5E52;--border:rgba(123,28,46,0.15);--green:#2E7D32;--red:#C62828;--blue:#1565C0;--orange:#E65100}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
.admin-nav{background:var(--wine-dark);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;position:sticky;top:0;z-index:100}
.nav-brand{color:white;font-family:'Playfair Display',serif;font-size:17px;text-decoration:none;font-weight:700}
.nav-link{color:rgba(255,255,255,0.7);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;white-space:nowrap}
.nav-link:hover{color:white;background:rgba(255,255,255,0.1)}
.nav-link.active{color:white;background:rgba(255,255,255,0.18)}
.container{max-width:1100px;margin:0 auto;padding:28px 32px}
.card{background:white;border-radius:10px;border:1px solid var(--border);padding:24px;margin-bottom:20px}
.card h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--wine-dark);margin-bottom:4px}
.card p{font-size:13px;color:var(--muted);margin-bottom:16px}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:var(--wine);color:white}
.btn-primary:hover:not(:disabled){background:var(--wine-dark)}
.btn-secondary{background:white;color:var(--wine);border:1.5px solid var(--wine)}
.btn-green{background:var(--green);color:white}
.btn-orange{background:var(--orange);color:white}




.stat-num.green{color:var(--green)}
.stat-num.orange{color:var(--orange)}
.stat-num.red{color:var(--red)}
.stat-num.blue{color:var(--blue)}













.warning{background:rgba(230,81,0,.08);border:1px solid rgba(230,81,0,.25);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--orange);margin-bottom:16px}
.manual-search-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.mfg{display:flex;flex-direction:column;gap:4px}
.mfg label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.mfg input{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;background:white;font-family:'DM Sans',sans-serif}
.mfg input:focus{outline:none;border-color:var(--wine)}


.vintage-card.has-price{border-color:rgba(46,125,50,.3);background:rgba(46,125,50,.04)}
.vintage-card.no-price{border-color:var(--border);opacity:.7}




.vc-save:disabled{opacity:.4;cursor:default}



.save-all-btn:disabled{opacity:.4}

.result-table th{text-align:left;padding:8px 10px;background:var(--wine-dark);color:white;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.result-table td{padding:7px 10px;border-bottom:1px solid var(--border)}



</style>
</head>
<body>

<nav class="admin-nav">
  <a class="nav-brand" href="/admin.html">🍷 WineSteals Admin</a>
  <div style="display:flex;gap:4px">
    <a href="/admin.html" class="nav-link">Wijnen</a>
    <a href="/admin-scans.html" class="nav-link">Scans</a>
    <a href="/admin-restaurants.html" class="nav-link">Restaurants</a>
    <a href="/admin-wineapi.html" class="nav-link">WineAPI</a>
    <a href="/admin-ct-batch.html" class="nav-link active">CT Batch</a>
  </div>
</nav>

<div class="container">

  <div class="card">
    <h2>Zoek op Wine-Searcher</h2>
    <p>Zoek een wijn op Wine-Searcher om de actuele marktprijs te checken. Opent Wine-Searcher in een nieuw tabblad met de juiste zoekterm.</p>

    <div class="manual-search-row">
      <div class="mfg" style="flex:2;min-width:200px">
        <label>Wijn / producent</label>
        <input id="ms-name" type="text" placeholder="bijv. Domaine Tempier Bandol" onkeydown="if(event.key==='Enter')openWineSearcher()"/>
      </div>
      <div class="mfg" style="flex:1;min-width:120px">
        <label>Producent (optioneel)</label>
        <input id="ms-producer" type="text" placeholder="bijv. Tempier" onkeydown="if(event.key==='Enter')openWineSearcher()"/>
      </div>
      <div class="mfg" style="width:90px">
        <label>Jaar (optioneel)</label>
        <input id="ms-vintage" type="number" placeholder="2019" min="1990" max="2030" onkeydown="if(event.key==='Enter')openWineSearcher()"/>
      </div>
<button class="btn btn-primary" id="ms-btn" onclick="openWineSearcher()" style="align-self:flex-end;background:#1a6b3c">🔍 Open Wine-Searcher</button>
    </div>

    <div id="ms-status" style="font-size:13px;color:var(--muted);margin-bottom:8px"></div>
  </div>


</div>

<script>
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkaGN6bGFiamVjcXhseXV4cHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDI1MzEsImV4cCI6MjA5MTU3ODUzMX0.9vpr3P0Q6xhs_99nLsU_yE3Ht6prPe9cPjUrt0f5mX4';
const ADMIN_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkaGN6bGFiamVjcXhseXV4cHJsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjAwMjUzMSwiZXhwIjoyMDkxNTc4NTMxfQ.8Ok37JAr6c4IDb4RZuOKY2nddje7e-nLdQYa7jLUJhs';
const SB='https://kdhczlabjecqxlyuxprl.supabase.co/rest/v1';
const H=(x,admin)=>{const k=admin?ADMIN_KEY:KEY;return{'apikey':k,'Authorization':'Bearer '+k,'Content-Type':'application/json',...x};};

function openWineSearcher() {
  const name = document.getElementById('ms-name').value.trim();
  const producer = document.getElementById('ms-producer').value.trim();
  const vintage = document.getElementById('ms-vintage').value.trim();

  if (!name) {
    document.getElementById('ms-status').textContent = 'Voer een wijn- of producersnaam in';
    return;
  }

  const q = [vintage, producer, name].filter(Boolean).join(' ');
  const url = 'https://www.wine-searcher.com/find/' + encodeURIComponent(q);
  document.getElementById('ms-status').textContent = '✓ Wine-Searcher geopend in nieuw tabblad';
  window.open(url, '_blank');
}

function renderManualResults(results) {
  const grid = document.getElementById('ms-vintage-grid');
  grid.innerHTML = results.sort((a,b) => (b.vintage||0)-(a.vintage||0)).map(v => `
    <div class="vintage-card ${v.price ? 'has-price' : 'no-price'}" id="vc-${v.iWine}">
      <div class="vc-year">${v.vintage || '?'}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${v.name}</div>
      ${v.price
        ? `<div class="vc-price">€${v.price.toFixed(2)}</div>`
        : `<div class="vc-noprice">Geen prijs beschikbaar</div>`
      }
      ${v.price
        ? `<button class="vc-save" onclick="saveSingleVintage('${v.iWine}')">Opslaan</button>`
        : `<a href="${CT}/wine.asp?iWine=${v.iWine}" target="_blank" style="font-size:11px;color:var(--blue);display:block;margin-top:6px">Open op CT →</a>`
      }
    </div>
  `).join('');
}

async function saveSingleVintage(iWine) {
  const v = manualVintages.find(x => x.iWine === iWine);
  if (!v || !v.price) return;

  const btn = document.querySelector(`#vc-${iWine} .vc-save`);
  if (btn) { btn.disabled = true; btn.textContent = '...'; }

  try {
    // Als er een wine_id is (vanuit pending), koppel eraan
    if (manualWineId) {
      await fetch(SB+'/wine_vintage_prices', {
        method: 'POST',
        headers: H({'Prefer':'resolution=merge-duplicates'}, true),
        body: JSON.stringify({
          wine_id: manualWineId,
          vintage: v.vintage,
          market_price_eur: v.price,
          market_price_min: Math.round(v.price*.8*100)/100,
          market_price_max: Math.round(v.price*1.3*100)/100,
          price_source: 'cellartracker'
        })
      });
    }

    const card = document.getElementById('vc-'+iWine);
    if (card) {
      const saveBtn = card.querySelector('.vc-save');
      if (saveBtn) saveBtn.replaceWith(Object.assign(document.createElement('div'), {className:'vc-saved', textContent:'✓ Opgeslagen'}));
    }
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Opslaan'; }
    alert('Fout: ' + e.message);
  }
}

async function saveAllVintages() {
  const withPrice = manualVintages.filter(v => v.price && v.vintage);
  if (!withPrice.length) return;

  const btn = document.getElementById('ms-save-all');
  btn.disabled = true; btn.textContent = `Opslaan (0/${withPrice.length})...`;

  let saved = 0;
  for (const v of withPrice) {
    await saveSingleVintage(v.iWine);
    saved++;
    btn.textContent = `Opslaan (${saved}/${withPrice.length})...`;
    await new Promise(r => setTimeout(r, 100));
  }

  btn.textContent = `✓ ${saved} opgeslagen`;

  // Als er een pending wine_id is, update ook de wine zelf
  if (manualWineId) {
    const prices = withPrice.map(v => v.price);
    const avg = Math.round(prices.reduce((a,b)=>a+b,0)/prices.length*100)/100;
    try {
      await fetch(SB+'/wines?id=eq.'+manualWineId, {
        method: 'PATCH',
        headers: H({'Prefer':'return=minimal'}, true),
        body: JSON.stringify({
          market_price_eur: avg,
          market_price_min: Math.round(avg*.8*100)/100,
          market_price_max: Math.round(avg*1.3*100)/100,
          price_source: 'cellartracker'
        })
      });
    } catch(e) { /* skip */ }
  }
}

// Init
loadPending();
</script>
</body>
</html>
