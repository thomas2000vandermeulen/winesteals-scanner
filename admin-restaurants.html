<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Restaurants — WineSteals Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--wine:#7B1C2E;--wine-dark:#4A0F1C;--gold:#C9A84C;--cream:#F8F4EE;--ink:#1A1208;--muted:#6B5E52;--border:rgba(123,28,46,0.15);--green:#2E7D32;--red:#C62828}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
.admin-nav{background:var(--wine-dark);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px;position:sticky;top:0;z-index:100}
.nav-brand{color:white;font-family:'Playfair Display',serif;font-size:17px;text-decoration:none;font-weight:700}
.nav-links{display:flex;gap:4px}
.nav-link{color:rgba(255,255,255,0.7);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500}
.nav-link:hover{color:white;background:rgba(255,255,255,0.1)}
.nav-link.active{color:white;background:rgba(255,255,255,0.18)}
.login-overlay{position:fixed;inset:0;background:var(--wine-dark);z-index:999;display:flex;align-items:center;justify-content:center}
.login-overlay.hidden{display:none}
.login-box{background:var(--cream);padding:48px 40px;border-radius:12px;width:360px;text-align:center}
.login-box h2{font-family:'Playfair Display',serif;color:var(--wine-dark);margin-bottom:8px}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:16px;background:white}
.login-box button{width:100%;padding:12px;background:var(--wine);color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer}
.container{max-width:1200px;margin:0 auto;padding:28px 32px}
.page-header{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.page-header h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--wine-dark)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500}
.btn-secondary{background:white;color:var(--wine);border:1.5px solid var(--wine)}
.btn-primary{background:var(--wine);color:white}
.btn-danger{background:var(--red);color:white}
.btn-sm{padding:5px 10px;font-size:12px}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.toolbar input{padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:white;flex:1;min-width:200px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.rest-card{background:white;border-radius:10px;border:1px solid var(--border);padding:20px}
.rest-card h3{font-size:15px;font-weight:600;margin-bottom:4px}
.rest-card .city{font-size:13px;color:var(--muted);margin-bottom:12px}
.rest-card .meta{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.rest-card .actions{display:flex;gap:8px;flex-wrap:wrap}
.rest-card .steal-count{display:inline-block;padding:3px 9px;background:rgba(123,28,46,.08);color:var(--wine);border-radius:12px;font-size:12px;font-weight:500}
.add-panel{background:white;border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:20px}
.add-panel h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--wine-dark)}
.add-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{flex:1;min-width:140px}
.fg label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:4px}
.fg input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px}
.empty{text-align:center;padding:60px;color:var(--muted)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:14px;color:white;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
</style>
</head>
<body>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>WineSteals</h2>
    <p>Admin toegang vereist</p>
    <input type="password" id="pw-input" placeholder="Wachtwoord" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button onclick="checkPw()">Inloggen</button>
  </div>
</div>

<nav class="admin-nav">
  <a class="nav-brand" href="/admin.html">🍷 WineSteals Admin</a>
  <div class="nav-links">
    <a href="/admin.html" class="nav-link">Wijnen</a>
    <a href="/admin-prices.html" class="nav-link">Price Finder</a>
    <a href="/admin-scans.html" class="nav-link">Scans</a>
    <a href="/admin-restaurants.html" class="nav-link active">Restaurants</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Restaurants</h1>
    <button class="btn btn-secondary" onclick="load()">↻ Vernieuwen</button>
  </div>

  <div class="add-panel">
    <h3>Restaurant toevoegen</h3>
    <div class="add-row">
      <div class="fg"><label>Naam *</label><input id="r-name" type="text" placeholder="bijv. De Badcuyp"></div>
      <div class="fg"><label>Stad</label><input id="r-city" type="text" placeholder="Amsterdam"></div>
      <div class="fg"><label>Adres</label><input id="r-addr" type="text" placeholder="Swammerdamstraat 10"></div>
      <button class="btn btn-primary" onclick="addRestaurant()">+ Toevoegen</button>
    </div>
  </div>

  <div class="toolbar">
    <input id="q" type="text" placeholder="Zoek restaurant..." oninput="filter()"/>
  </div>

  <div class="grid" id="grid"><div class="empty"><p>Laden...</p></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PW='winesteals2026';
const SB='https://kdhczlabjecqxlyuxprl.supabase.co/rest/v1';
const SBKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkaGN6bGFiamVjcXhseXV4cHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDI1MzEsImV4cCI6MjA5MTU3ODUzMX0.9vpr3P0Q6xhs_99nLsU_yE3Ht6prPe9cPjUrt0f5mX4';

function checkPw(){
  if(document.getElementById('pw-input').value===PW){localStorage.setItem('ws_aa',btoa(PW));document.getElementById('login-overlay').classList.add('hidden');load();}
  else document.getElementById('pw-input').style.borderColor='red';
}
if(localStorage.getItem('ws_aa')===btoa(PW)){document.getElementById('login-overlay').classList.add('hidden');load();}

let allRests=[];

async function load(){
  const r=await fetch(SB+'/restaurants?order=last_scanned_at.desc&limit=500&select=id,name,city,address,lat,lng,last_scanned_at',{
    headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY}
  });
  allRests=await r.json();
  if(!Array.isArray(allRests))allRests=[];
  // Haal steal counts op
  const r2=await fetch(SB+'/scan_results?select=restaurant_id&is_steal=eq.true',{headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY}});
  const steals=await r2.json();
  const counts={};
  if(Array.isArray(steals))steals.forEach(s=>{counts[s.restaurant_id]=(counts[s.restaurant_id]||0)+1;});
  allRests.forEach(r=>r._steals=counts[r.id]||0);
  filter();
}

function filter(){
  const q=(document.getElementById('q')?.value||'').toLowerCase();
  render(allRests.filter(r=>!q||(r.name||'').toLowerCase().includes(q)||(r.city||'').toLowerCase().includes(q)));
}

function render(rests){
  const el=document.getElementById('grid');
  if(!rests.length){el.innerHTML='<div class="empty"><p>Geen restaurants</p></div>';return;}
  el.innerHTML=rests.map(r=>{
    const lastScan=r.last_scanned_at?new Date(r.last_scanned_at).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'2-digit'}):'Nooit';
    const hasCoords=r.lat&&r.lng;
    return`<div class="rest-card">
      <h3>${esc(r.name)}</h3>
      <div class="city">${esc(r.city||'')}${r.address?' · '+esc(r.address):''}</div>
      <div class="meta">
        <span>📅 Laatste scan: ${lastScan}</span>
        ${hasCoords?`<span>📍 ${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}</span>`:'<span style="color:#FF9800">📍 Geen locatie — kaart niet mogelijk</span>'}
      </div>
      ${r._steals?`<div class="steal-count">🍷 ${r._steals} steals gevonden</div>`:''}
      <div class="actions" style="margin-top:12px">
        ${!hasCoords?`<button class="btn btn-secondary btn-sm" onclick="addCoords('${r.id}','${esc(r.name)}','${esc(r.city||'Amsterdam')}')">📍 Locatie toevoegen</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="delRest('${r.id}',this)">🗑</button>
      </div>
    </div>`;
  }).join('');
}

async function addRestaurant(){
  const name=document.getElementById('r-name').value.trim();
  if(!name){toast('Naam verplicht','error');return;}
  const r=await fetch(SB+'/restaurants',{method:'POST',headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({name,city:document.getElementById('r-city').value.trim()||'Amsterdam',address:document.getElementById('r-addr').value.trim()||null})});
  if(!r.ok){toast('Fout: '+r.status,'error');return;}
  toast('Restaurant toegevoegd ✓');
  document.getElementById('r-name').value='';
  document.getElementById('r-city').value='';
  document.getElementById('r-addr').value='';
  load();
}

async function addCoords(id,name,city){
  const query=encodeURIComponent(name+' '+city+' restaurant');
  const apiUrl=`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`;
  try{
    const r=await fetch(apiUrl,{headers:{'User-Agent':'WineSteals/1.0'}});
    const d=await r.json();
    if(!d.length){toast('Geen locatie gevonden voor "'+name+'"','error');return;}
    const lat=parseFloat(d[0].lat),lng=parseFloat(d[0].lon);
    await fetch(SB+'/restaurants?id=eq.'+id,{method:'PATCH',headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({lat,lng})});
    toast('Locatie toegevoegd: '+lat.toFixed(4)+', '+lng.toFixed(4));
    load();
  }catch(e){toast('Fout: '+e.message,'error');}
}

async function delRest(id,btn){
  if(!confirm('Restaurant en alle scan resultaten verwijderen?'))return;
  btn.textContent='...';
  await fetch(SB+'/restaurants?id=eq.'+id,{method:'DELETE',headers:{'apikey':SBKEY,'Authorization':'Bearer '+SBKEY}});
  toast('Verwijderd');
  load();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'success')+' show';setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
